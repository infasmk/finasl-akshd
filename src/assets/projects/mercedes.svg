<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAE1B8"/>
      <stop offset="50%" stop-color="#D9B472"/>
      <stop offset="100%" stop-color="#8c6D34"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <!-- Architectural grid background -->
  <g opacity="0.12">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#D9B472" stroke-width="0.5"/>
    
    <line x1="100" y1="0" x2="100" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#D9B472" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#D9B472" stroke-width="0.5"/>
  </g>

  <!-- Mercedes-Benz Places (Futuristic Sensual Purity flowing aerodynamic shield) -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer curving shield silhouette -->
    <path d="M 320 500 C 310 250 350 120 400 120 C 450 120 490 250 480 500" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Sweeping inner aerodynamic solar cell panels -->
    <path d="M 340 500 C 335 270 365 150 400 150 C 435 150 465 270 460 500" stroke-width="1.2" opacity="0.7"/>
    <path d="M 360 500 C 355 300 380 180 400 180 C 420 180 445 300 440 500" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Three pointed star subtle constellation logo at top -->
    <path d="M 400 100 L 400 85" stroke-width="1.5" opacity="0.9"/>
    <path d="M 400 100 L 387 107" stroke-width="1.5" opacity="0.9"/>
    <path d="M 400 100 L 413 107" stroke-width="1.5" opacity="0.9"/>
    <circle cx="400" cy="99" r="13" stroke-width="1" opacity="0.85"/>

    <!-- Solar plate matrix lines -->
    <line x1="324" y1="450" x2="476" y2="450" stroke-width="0.8" opacity="0.5"/>
    <line x1="328" y1="400" x2="472" y2="400" stroke-width="0.8" opacity="0.5"/>
    <line x1="335" y1="350" x2="465" y2="350" stroke-width="0.8" opacity="0.5"/>
    <line x1="344" y1="300" x2="456" y2="300" stroke-width="0.8" opacity="0.5"/>
    <line x1="355" y1="250" x2="445" y2="250" stroke-width="0.8" opacity="0.5"/>
    <line x1="370" y1="200" x2="430" y2="200" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Ground Plane Datum Line -->
  <line x1="50" y1="500" x2="750" y2="500" stroke="#D9B472" stroke-width="2" opacity="0.8"/>

  <!-- Technical annotations -->
  <g fill="#D9B472" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">MERCEDES-BENZ PLACES // SENSUAL PURITY OUTLINE</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: DOWNTOWN DUBAI // INTEGRATED PHOTOVOLTAIC CLADDINGS</text>
    <text x="60" y="575" font-size="9" opacity="0.5">PREMIER GLASS WRAPPED GEOMETRIC SHIELD FRAMING THE BURJ KHALIFA</text>
    
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: GLOBAL BRANDED LIVING</text>
    <text x="740" y="565" font-size="9" opacity="0.5" text-anchor="end">70/30 ELEVATED PAYMENT STRUCTURE</text>
  </g>
</svg>
