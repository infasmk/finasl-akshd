<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D093"/>
      <stop offset="100%" stop-color="#8C6721"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Architectural grid background -->
  <g opacity="0.12">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#C5A059" stroke-width="0.5"/>
    
    <line x1="100" y1="0" x2="100" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#C5A059" stroke-width="0.5"/>
  </g>

  <!-- High-Rise Geometric Tower Outlines with Cantilever structures -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="1.8">
    <!-- Stepped blocks representing signature design style -->
    <rect x="340" y="320" width="120" height="180" opacity="0.8"/>
    <rect x="310" y="220" width="180" height="100" opacity="0.6"/>
    <rect x="350" y="140" width="100" height="80" opacity="0.9"/>
    
    <!-- Diagonal architectural bracing lines -->
    <line x1="310" y1="220" x2="490" y2="320" stroke-width="0.8" opacity="0.4"/>
    <line x1="490" y1="220" x2="310" y2="320" stroke-width="0.8" opacity="0.4"/>

    <!-- Balcony horizontal protrusions -->
    <line x1="280" y1="250" x2="310" y2="250" stroke-width="1.5" opacity="0.7"/>
    <line x1="280" y1="290" x2="310" y2="290" stroke-width="1.5" opacity="0.7"/>
    <line x1="490" y1="250" x2="520" y2="250" stroke-width="1.5" opacity="0.7"/>
    <line x1="490" y1="290" x2="520" y2="290" stroke-width="1.5" opacity="0.7"/>
    
    <line x1="340" y1="360" x2="460" y2="360" stroke-width="0.8" opacity="0.5"/>
    <line x1="340" y1="405" x2="460" y2="405" stroke-width="0.8" opacity="0.5"/>
    <line x1="340" y1="450" x2="460" y2="450" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Ground Plane Datum Line -->
  <line x1="50" y1="500" x2="750" y2="500" stroke="#C5A059" stroke-width="2" opacity="0.8"/>

  <!-- Technical annotations -->
  <g fill="#F2D093" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BINGHATTI SIGNATURE LUXURY // ARCHITECTURAL DRAWING</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: MULTIPLE HIGH-END HUBS DUBAI // ELEVATING METROPOLITAN PARADIGMS</text>
    <text x="60" y="575" font-size="9" opacity="0.5">TRADEMARK GEOMETRIC CANTILEVERS BALANCING LIGHTING LINES AND EXPANDED SPACES</text>
    
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: RESIDENTIAL BOUTIQUE</text>
    <text x="740" y="565" font-size="9" opacity="0.5" text-anchor="end">MULTIPLE BESPOKE PAYMENT PLANS</text>
  </g>
</svg>
