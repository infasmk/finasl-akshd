<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAE1B8"/>
      <stop offset="100%" stop-color="#8c6D34"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <g opacity="0.12">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#C5A059" stroke-width="0.5"/>
  </g>

  <!-- Binghatti Onyx (Obsidian overlapping blocks) -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="2">
    <rect x="330" y="200" width="140" height="300" opacity="0.8"/>
    <rect x="300" y="260" width="140" height="180" opacity="0.6"/>
    <rect x="360" y="140" width="80" height="120" opacity="0.7"/>
    <line x1="300" y1="350" x2="440" y2="350" stroke-width="0.8" opacity="0.5"/>
  </g>

  <line x1="50" y1="500" x2="750" y2="500" stroke="#C5A059" stroke-width="2" opacity="0.8"/>

  <g fill="#FAE1B8" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BINGHATTI ONYX // GEOMETRIC SCHEMATIC</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: JUMEIRAH VILLAGE CIRCLE // BOUTIQUE RESIDENCES</text>
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: BOUTIQUE LUXURY</text>
  </g>
</svg>
