<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9D99F"/>
      <stop offset="50%" stop-color="#D1A751"/>
      <stop offset="100%" stop-color="#7B5614"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <!-- Grid -->
  <g opacity="0.12">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#D1A751" stroke-width="0.5"/>
    
    <line x1="100" y1="0" x2="100" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#D1A751" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#D1A751" stroke-width="0.5"/>
  </g>

  <!-- Burj Binghatti Jacob & Co (Crown Spire Structure with jewelry diamond cresting) -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Main slender block -->
    <path d="M 360 500 L 360 160 L 400 100 L 440 160 L 440 500 Z" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Facet outlines representing Watch Sapphire glass or high jeweled edges -->
    <line x1="380" y1="500" x2="380" y2="140" stroke-width="1.2" opacity="0.6"/>
    <line x1="420" y1="500" x2="420" y2="140" stroke-width="1.2" opacity="0.6"/>
    <line x1="400" y1="500" x2="400" y2="100" stroke-width="1.5" opacity="0.85"/>

    <!-- Angular Facets on top spire -->
    <line x1="360" y1="160" x2="400" y2="180" stroke-width="1" opacity="0.75"/>
    <line x1="440" y1="160" x2="400" y2="180" stroke-width="1" opacity="0.75"/>
    <line x1="360" y1="160" x2="380" y2="140" stroke-width="1" opacity="0.75"/>
    <line x1="440" y1="160" x2="420" y2="140" stroke-width="1" opacity="0.75"/>

    <!-- Diamond Crown jewel spires at the tip -->
    <circle cx="400" cy="100" r="4" fill="#F9D99F" opacity="0.9"/>
    <path d="M 375 140 L 400 80 L 425 140 Z" stroke-width="1" stroke-dasharray="2,2" opacity="0.7"/>
    <circle cx="400" cy="80" r="2.5" fill="#FFFFFF" opacity="0.95"/>

    <!-- Horizontal floor levels representing luxury suites -->
    <line x1="360" y1="460" x2="440" y2="460" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="420" x2="440" y2="420" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="380" x2="440" y2="380" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="340" x2="440" y2="340" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="300" x2="440" y2="300" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="260" x2="440" y2="260" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="220" x2="440" y2="220" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="180" x2="440" y2="180" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Ground Plane Datum Line -->
  <line x1="50" y1="500" x2="750" y2="500" stroke="#D1A751" stroke-width="2" opacity="0.8"/>

  <!-- Technical annotations -->
  <g fill="#F9D99F" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BURJ BINGHATTI JACOB &amp; CO // HYPERLUXURY ELEVATION</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: BUSINESS BAY DUBAI // WORLD'S TALLEST RESIDENTIAL SYSTEM</text>
    <text x="60" y="575" font-size="9" opacity="0.5">CROWN ARCHITECTURE DESIGN STYLED WITH HIGH WATCH HOROLOGY DIAMONDS</text>
    
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: SUPER-TALL SKYSCRAPER</text>
    <text x="740" y="565" font-size="9" opacity="0.5" text-anchor="end">60/40 ARCHITECTURAL MILESTONE</text>
  </g>
</svg>
