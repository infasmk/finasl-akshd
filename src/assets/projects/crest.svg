<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D093"/>
      <stop offset="100%" stop-color="#8C6721"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Binghatti Crest (Dynamic golden curves) -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="2">
    <!-- Waves -->
    <path d="M 300 500 C 320 400 280 300 320 200 C 340 100 380 150 400 120" stroke-width="2" opacity="0.8"/>
    <path d="M 330 500 C 350 410 310 310 350 210 C 370 110 410 160 430 120" stroke-width="1.5" opacity="0.6"/>
    <path d="M 500 500 L 500 220 L 460 200 Z" stroke-width="1" opacity="0.5"/>
  </g>

  <line x1="50" y1="500" x2="750" y2="500" stroke="#C5A059" stroke-width="2" opacity="0.8"/>

  <g fill="#F2D093" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BINGHATTI CREST // STRUCTURAL DRAWING</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: JVC DUBAI // DYNAMIC GOLDEN FAÇADE WAVES</text>
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: HIGH-RISE RESIDENTIAL</text>
  </g>
</svg>
