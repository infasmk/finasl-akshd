<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D093"/>
      <stop offset="50%" stop-color="#C5A059"/>
      <stop offset="100%" stop-color="#8C6721"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <!-- Architectural Grid background -->
  <g opacity="0.12">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#C5A059" stroke-width="0.5"/>
    
    <line x1="100" y1="0" x2="100" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#C5A059" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#C5A059" stroke-width="0.5"/>
  </g>

  <!-- Technical Marks -->
  <g opacity="0.4" stroke="#C5A059" stroke-width="1">
    <circle cx="400" cy="300" r="180" fill="none" stroke-dasharray="4,4"/>
    <line x1="400" y1="80" x2="400" y2="520" stroke-dasharray="10,5"/>
    <line x1="180" y1="300" x2="620" y2="300" stroke-dasharray="10,5"/>
  </g>

  <!-- Bugatti Curvaceous Hyper-Tower Outline -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer aerodynamic sweep facade -->
    <path d="M 330 500 Q 300 300 400 120 Q 500 300 470 500" stroke-width="3" opacity="0.9"/>
    
    <!-- Flowing inner curves representing French racing blue inspiration lines -->
    <path d="M 350 500 Q 315 310 400 160 Q 485 310 450 500" stroke-width="1.5" opacity="0.7"/>
    <path d="M 370 500 Q 345 320 400 200 Q 455 320 430 500" stroke-width="1" opacity="0.5"/>
    <path d="M 390 500 Q 375 330 400 240 Q 425 330 410 500" stroke-width="0.75" opacity="0.3"/>
    
    <!-- Horizontal floor plate indicators crossing the curves -->
    <line x1="324" y1="460" x2="476" y2="460" stroke-width="1" opacity="0.6"/>
    <line x1="319" y1="420" x2="481" y2="420" stroke-width="1" opacity="0.6"/>
    <line x1="315" y1="380" x2="485" y2="380" stroke-width="1" opacity="0.6"/>
    <line x1="313" y1="340" x2="487" y2="340" stroke-width="1" opacity="0.6"/>
    <line x1="318" y1="300" x2="482" y2="300" stroke-width="1" opacity="0.6"/>
    <line x1="327" y1="260" x2="473" y2="260" stroke-width="1" opacity="0.6"/>
    <line x1="340" y1="220" x2="460" y2="220" stroke-width="1" opacity="0.6"/>
    <line x1="358" y1="180" x2="442" y2="180" stroke-width="1" opacity="0.6"/>
    <line x1="380" y1="140" x2="420" y2="140" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Ground Plane Datum Line -->
  <line x1="50" y1="500" x2="750" y2="500" stroke="#C5A059" stroke-width="2" opacity="0.8"/>

  <!-- Technical annotations -->
  <g fill="#F2D093" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BINGHATTI &amp; BUGATTI // MASTER SCHEMATIC</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: BUSINESS BAY DUBAI // ELEVATION: 420M</text>
    <text x="60" y="575" font-size="9" opacity="0.5">REPRESENTS FRENCH RACING LUXURY IN THE DUBAI SKY</text>
    
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: HYPER-TOWER</text>
    <text x="740" y="565" font-size="9" opacity="0.5" text-anchor="end">70/30 PAYMENT STRUCTURE</text>
  </g>
</svg>
