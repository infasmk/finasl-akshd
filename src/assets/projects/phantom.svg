<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAE1B8"/>
      <stop offset="100%" stop-color="#8c6D34"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Binghatti Phantom -->
  <g stroke="url(#gold-grad)" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="1.8">
    <path d="M 320 500 L 350 150 L 400 100 L 450 150 L 480 500 Z" opacity="0.8"/>
    <line x1="400" y1="100" x2="400" y2="500" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.6"/>
  </g>

  <line x1="50" y1="500" x2="750" y2="500" stroke="#C5A059" stroke-width="2" opacity="0.8"/>

  <g fill="#FAE1B8" font-family="monospace" opacity="0.75">
    <text x="60" y="540" font-size="11" letter-spacing="1.5">BINGHATTI PHANTOM // SCHEMATIC SURVEY</text>
    <text x="60" y="560" font-size="9" opacity="0.5">LOCATION: DUBAI WATER CANAL // SOVEREIGN SKY APEX</text>
    <text x="740" y="545" font-size="14" font-weight="bold" text-anchor="end">TYPE: WATERFRONT LUXURY</text>
  </g>
</svg>
